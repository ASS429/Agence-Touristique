# Téranga Voyages — config Netlify
# Site statique sans build : on publie directement la racine du repo.

[build]
  publish = "."
  command = ""

# Cache long sur les assets immuables (photos, vidéo, JSX du prototype)
[[headers]]
  for = "/images_du_sénégal/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vidéo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Headers de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

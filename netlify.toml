# Téranga Voyages — config Netlify
# Site statique sans build : on publie directement la racine du repo.

[build]
  publish = "."
  command = ""

# Cache long sur les assets immuables (photos, vidéo, JSX du prototype)
[[headers]]
  for = "/images_du_sénégal/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vidéo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Favicons : cache moyen
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/apple-touch-icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# robots.txt + sitemap.xml : pas de cache long (les crawlers doivent voir
# les mises à jour rapidement)
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

# PWA : le service worker NE DOIT JAMAIS être caché — sinon les mises
# à jour ne se propagent pas. Le manifest peut avoir un cache court.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json; charset=utf-8"

# Headers de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

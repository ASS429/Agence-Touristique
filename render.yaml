# Africa Connection Tours — config Render Static Site (Phase D — build Vite)
# Le site est désormais compilé par Vite : Render installe les dépendances,
# lance `npm run build`, et publie le dossier `dist/`.
# Render lit ce fichier automatiquement quand on connecte le dépôt GitHub.

services:
  - type: web
    name: act-senegal-site
    runtime: static
    buildCommand: "npm ci && npm run build && npm run prerender"
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false

    # --- Routing ---
    # Vraies URLs (History API) : chaque route publique est prérendue en HTML
    # statique (dist/<route>/index.html, voir scripts/prerender.mjs) — Render
    # sert le fichier s'il existe, sinon le rewrite SPA ci-dessous prend le
    # relais (routes dynamiques : /monespace, /carnet/:slug, contenus admin).
    # L'admin est une seconde page (/admin/), routage hash interne conservé.
    routes:
      - type: rewrite
        source: /admin
        destination: /admin/index.html
      - type: rewrite
        source: /*
        destination: /index.html

    # --- Headers ---
    headers:
      # Assets Vite content-hashés (JS/CSS/fonts) → cache long.
      # Un nouveau déploiement référence de nouveaux noms de fichiers,
      # donc aucun cache périmé n'est jamais servi pour un fichier modifié.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=604800

      # Médias lourds (photos, vidéo) : stables → cache long immuable.
      - path: /images_du_senegal/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /vidéo/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # SEO files : pas de cache long pour que les crawlers voient les MAJ
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=3600
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=3600

      # PWA : le service worker NE DOIT JAMAIS être caché (critique pour MAJ)
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=3600

      # Headers de sécurité globaux
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), interest-cohort=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin

      # CSP ACTIVE — partielle et SÛRE (clickjacking + base-hijacking).
      # Depuis la migration Vite, plus aucun CDN pour Babel/Tailwind/polices
      # (tout est self-hosté), mais Sentry, GA4, Supabase et Formspree
      # restent des origines externes. Durcir script-src/connect-src À
      # L'AVEUGLE casserait ces intégrations → voir la CSP stricte proposée
      # ci-dessous, à activer et TESTER sur une préversion Render avant prod.
      - path: /*
        name: Content-Security-Policy
        value: "frame-ancestors 'none'; object-src 'none'; base-uri 'self'"

      # --- CSP STRICTE PROPOSÉE (à tester sur préversion puis remplacer ci-dessus) ---
      # NB : la carte (Leaflet) reste chargée via unpkg.com et tire ses tuiles
      # depuis openstreetmap.org — d'où les origines correspondantes ci-dessous.

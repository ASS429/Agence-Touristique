<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ACT — Administration</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#C8593B" />

<link rel="icon" type="image/png" href="/assets/logo-act.png" />

<!-- Keyframe minimal pour le spinner d'amorçage (avant chargement du CSS/JS) -->
<style>
  @keyframes act-spin { to { transform: rotate(360deg); } }
  html, body { margin: 0; background: #FBF8F3; }
</style>

<!-- Sentry — monitoring erreurs de l'admin (chargé avant l'app). -->
<script>window.ACT_SENTRY_DSN = "https://c9c23ae92fdc9eaf1bb9525537a2967d@o4511463259570176.ingest.de.sentry.io/4511706354483280";</script>
<script>
  (function () {
    if (!window.ACT_SENTRY_DSN) return;
    var s = document.createElement('script');
    s.src = 'https://browser.sentry-cdn.com/7.120.0/bundle.min.js';
    s.crossOrigin = 'anonymous';
    s.onload = function () {
      if (window.Sentry) window.Sentry.init({ dsn: window.ACT_SENTRY_DSN, environment: 'admin', tracesSampleRate: 0 });
    };
    document.head.appendChild(s);
  })();
</script>
</head>
<body>
<div id="admin-root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div style="width:32px;height:32px;border:2px solid #C8593B;border-top-color:transparent;border-radius:50%;animation:act-spin .8s linear infinite;"></div>
  </div>
</div>

<!-- Application admin (module ES compilé par Vite) -->
<script type="module" src="/src/admin/app.jsx"></script>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build (public + admin)
        run: npm run build
      # Smoke : rend chaque route en headless (Chrome préinstallé sur les
      # runners ubuntu) et vérifie le contenu → attrape les erreurs runtime
      # type « composant utilisé sans import » que le build ne voit pas.
      - name: Smoke test (routes)
        run: npm run smoke

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Tests unitaires (helpers : routeur, SEO/JSON-LD, WhatsApp)
      - name: Unit tests (Vitest)
        run: npm run test
      # Le build inclut le prérendu SEO (hook postbuild → scripts/prerender.mjs),
      # comme sur Render — un échec de prérendu casse le job avant la prod.
      - name: Build (public + admin + prérendu)
        run: npm run build
      # Smoke : rend chaque route en headless (Chrome préinstallé sur les
      # runners ubuntu) et vérifie le contenu → attrape les erreurs runtime
      # type « composant utilisé sans import » que le build ne voit pas.
      - name: Smoke test (routes)
        run: npm run smoke
      # E2E : 4 parcours business (devis, contact, langue, legacy+vidéo)
      # sur le build de prod — réseau externe intercepté (hermétique).
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: E2E tests (Playwright)
        run: npm run test:e2e
      # Lighthouse : budgets qualité (a11y ≥ 0.90, SEO ≥ 0.95, BP ≥ 0.90 ;
      # perf en warn — le serveur statique LHCI ne compresse pas).
      - name: Lighthouse budgets
        run: npm run lighthouse
      # Diagnostic : en cas d'échec, liste les audits fautifs par catégorie
      # (le rapport assert ne montre que le score global).
      - name: Lighthouse failing audits (debug)
        if: failure()
        run: |
          node -e "
          const fs=require('fs');
          for(const f of fs.readdirSync('.lighthouseci').filter(x=>x.startsWith('lhr-')&&x.endsWith('.json'))){
            const r=JSON.parse(fs.readFileSync('.lighthouseci/'+f));
            console.log('===', r.finalDisplayedUrl);
            for(const [cat,c] of Object.entries(r.categories)){
              for(const ref of c.auditRefs){
                const a=r.audits[ref.id];
                if(a && a.score!==null && a.score<0.9) console.log(' ', cat, '·', ref.id, '=', a.score, '·', (a.title||'').slice(0,90));
              }
            }
          }"

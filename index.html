<!-- PWA : enregistrement du service worker. Ignoré en file:// ou http://
     (les SW exigent HTTPS, sauf localhost). Erreurs silencieuses. -->
<script>
  // Service worker + détection de nouvelle version pour la PWA installée.
  //
  // Flow :
  // 1. Enregistrement du SW au load
  // 2. Écoute des events `updatefound` → un nouveau SW est installé
  // 3. Quand le nouveau SW est en attente (state=installed avec controller
  //    existant), on stocke la version disponible dans window.__actUpdate
  // 4. Le composant UpdateNotifier (shared.jsx) affiche une bannière et
  //    propose "Actualiser" — ça envoie SKIP_WAITING au SW et recharge.
  //
  // Diffusion active : à chaque chargement/focus, on demande la version
  // du SW actif ET du SW en attente. Si elles diffèrent, on affiche.
  window.__actUpdate = null;   // { newVersion, notes } quand dispo
  window.__actUpdateReady = () => {
    // hook appelé par le composant React quand il s'installe pour
    // (re)vérifier l'état à l'ouverture. Idempotent.
    if (window.__actCheckUpdate) window.__actCheckUpdate();
  };
  if ('serviceWorker' in navigator
      && (location.protocol === 'https:' || ['localhost','127.0.0.1'].includes(location.hostname))) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        window.__actSwReg = reg;
        // Fonction de check appelable par React quand le composant est prêt.
        window.__actCheckUpdate = () => {
          const waiting = reg.waiting;
          if (waiting) {
            waiting.postMessage({ type: 'GET_VERSION' });
          }
        };
        // Détecte un nouveau SW installé (mise à jour du site).
        reg.addEventListener('updatefound', () => {
          const nsw = reg.installing;
          if (!nsw) return;
          nsw.addEventListener('statechange', () => {
            if (nsw.state === 'installed' && navigator.serviceWorker.controller) {
              // Nouveau SW en attente → on récupère sa version
              nsw.postMessage({ type: 'GET_VERSION' });
            }
          });
        });
        // Écoute les réponses du SW (version + notes)
        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data?.type === 'VERSION') {
            window.__actUpdate = { newVersion: e.data.version, notes: e.data.notes };
            window.dispatchEvent(new CustomEvent('act-update-available', { detail: window.__actUpdate }));
          }
        });
        // Reload automatique quand le nouveau SW prend la main
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        // Vérification périodique (toutes les heures pour la PWA installée)
        setInterval(() => reg.update().catch(()=>{}), 60 * 60 * 1000);
      }).catch(() => {});
    });
  }
</script>
</body>
</html>
